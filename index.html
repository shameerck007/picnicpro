<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Picnic Manager</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Picnic">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a2a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231a3a2a'/><text y='.9em' font-size='72' x='50%' dominant-baseline='middle' text-anchor='middle'>🌿</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --cream:#faf7f2;--cream2:#f3ede3;--cream3:#ede5d8;--white:#ffffff;
  --forest:#1a3a2a;--forest2:#2d5a3d;--sage:#4a7c59;--sage2:#6aaa7a;
  --mint:#b8dfc5;--mint2:#d6f0e0;
  --terra:#c9622f;--terra2:#e07845;
  --gold:#d4a017;--gold2:#f0be3d;
  --rose:#c94a4a;--sky:#3a7fa8;--sky2:#5ba3ce;
  --text:#1a2a1e;--text2:#4a5e50;--text3:#7a9080;
  --border:rgba(26,58,42,0.1);--border2:rgba(26,58,42,0.06);
  --shadow:0 2px 20px rgba(26,58,42,0.08);
  --shadow-lg:0 8px 40px rgba(26,58,42,0.14);
  --radius:20px;--radius-sm:14px;--radius-xs:10px;
  --desktop-max:480px;
  --nav-h:64px;
}
html{height:100%;-webkit-overflow-scrolling:touch;}
body{min-height:100%;font-family:'Manrope',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}
h1,h2,h3,h4,h5{font-family:'Sora',sans-serif;}
input,select,textarea,button{font-family:'Manrope',sans-serif;font-size:16px;}
button{cursor:pointer;min-height:44px;}
input,select{-webkit-appearance:none;appearance:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--sage2);border-radius:4px;}

@media (min-width:768px){
  body{background:linear-gradient(135deg,#e8f5ec 0%,#f0f7f3 40%,#faf7f2 100%);display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:24px 16px 40px;}
  #app-shell{width:100%;max-width:var(--desktop-max);background:var(--cream);border-radius:40px;box-shadow:0 30px 80px rgba(26,58,42,0.22),0 4px 20px rgba(26,58,42,0.1),0 0 0 1px rgba(26,58,42,0.08);overflow:hidden;position:relative;min-height:calc(100vh - 48px);display:flex;flex-direction:column;}
  #auth-page.active{border-radius:40px;max-width:var(--desktop-max);min-height:calc(100vh - 48px);margin:0 auto;box-shadow:0 30px 80px rgba(26,58,42,0.22),0 4px 20px rgba(26,58,42,0.1);overflow:hidden;}
  body::before{content:'Picnic Manager';position:fixed;top:0;left:0;right:0;height:24px;background:var(--forest);color:rgba(255,255,255,0.5);font-family:'Sora',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;z-index:9999;}
  body{padding-top:48px;}
  #app-page{flex:1;display:flex !important;flex-direction:column;border-radius:40px;overflow:hidden;}
  .bottom-nav{position:sticky !important;bottom:0 !important;border-radius:0 0 40px 40px;}
  .topbar{border-radius:0 !important;}
  #app-page .tab-content.active{flex:1;overflow-y:auto;min-height:0;}
  .sheet-overlay{align-items:center;}
  .sheet{border-radius:28px !important;max-height:90vh;overflow-y:auto;}
}

@media (max-width:767px){
  body{position:static;width:100%;height:auto;overflow:auto;}
  #auth-page.active{position:fixed !important;inset:0 !important;overflow-y:auto !important;-webkit-overflow-scrolling:touch !important;display:block !important;padding:20px !important;padding-top:max(24px, env(safe-area-inset-top, 0px)) !important;padding-bottom:max(32px, env(safe-area-inset-bottom, 0px)) !important;z-index:10;}
  #auth-page.active .auth-card{margin:12px auto;}
  #app-shell{position:fixed !important;top:0 !important;left:0 !important;right:0 !important;bottom:0 !important;width:100% !important;height:100% !important;display:flex;flex-direction:column;overflow:hidden;}
  #app-page{flex:1;min-height:0;display:flex !important;flex-direction:column;overflow:hidden;}
  .topbar{flex-shrink:0 !important;}
  #app-page .tab-content.active{flex:1 !important;min-height:0 !important;overflow-y:auto !important;-webkit-overflow-scrolling:touch !important;overscroll-behavior-y:contain;}
  .bottom-nav{flex-shrink:0 !important;padding-bottom:max(10px, env(safe-area-inset-bottom, 0px));}
  .sheet-overlay{bottom:var(--nav-h) !important;}
  .sheet{padding-bottom:16px !important;border-radius:28px 28px 0 0 !important;max-height:calc(100svh - var(--nav-h) - 20px);overflow-y:auto;}
}

.page{display:none;}
#auth-page.active{display:flex;background:linear-gradient(160deg,var(--cream) 0%,#e8f5ec 50%,#faf7f2 100%);align-items:center;justify-content:center;padding:20px;min-height:100vh;position:relative;overflow:hidden;}
#auth-page.active::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(106,170,122,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(201,98,47,0.08) 0%,transparent 50%);pointer-events:none;}
.blob1,.blob2,.blob3{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.4;pointer-events:none;}
.blob1{width:300px;height:300px;background:var(--mint);top:-80px;right:-80px;}
.blob2{width:200px;height:200px;background:rgba(212,160,23,0.3);bottom:40px;left:-60px;}
.blob3{width:150px;height:150px;background:rgba(106,170,122,0.4);top:50%;left:60%;}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:28px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(26,58,42,0.12),0 2px 8px rgba(26,58,42,0.06);position:relative;z-index:1;}
.auth-logo{width:68px;height:68px;background:linear-gradient(135deg,var(--forest2),var(--sage));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px;box-shadow:0 8px 24px rgba(45,90,61,0.3);}
.auth-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;color:var(--forest);}
.auth-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;font-weight:500;}
.tab-row{display:flex;background:var(--cream2);border-radius:14px;padding:4px;gap:4px;margin-bottom:24px;border:1px solid var(--border);}
.tab-btn{flex:1;padding:10px;border:none;border-radius:10px;font-weight:700;font-size:14px;background:transparent;color:var(--text3);transition:all 0.2s;font-family:'Sora',sans-serif;}
.tab-btn.active{background:var(--white);color:var(--forest);box-shadow:var(--shadow);}
.form-group{margin-bottom:14px;}
.field-label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.field-input{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);outline:none;transition:all 0.2s;font-family:'Manrope',sans-serif;}
.field-input:focus{border-color:var(--sage);background:var(--white);box-shadow:0 0 0 3px rgba(106,170,122,0.15);}
.field-input option{background:#fff;color:var(--text);}
.primary-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--forest2),var(--sage));color:#fff;font-weight:700;font-size:15px;border:none;border-radius:14px;box-shadow:0 6px 20px rgba(45,90,61,0.3);transition:all 0.2s;font-family:'Sora',sans-serif;letter-spacing:0.3px;}
.primary-btn:active{transform:scale(0.98);}
.link-btn{background:none;border:none;color:var(--sage2);font-size:13px;font-weight:600;padding:8px 0;width:100%;cursor:pointer;}
.alert{border-radius:12px;padding:14px 16px;font-size:13px;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.alert-ok{background:rgba(106,170,122,0.12);border:1px solid rgba(106,170,122,0.3);color:var(--forest2);}
.alert-err{background:rgba(201,98,47,0.08);border:1px solid rgba(201,98,47,0.2);color:var(--terra);}

#app-page{display:none;background:var(--cream);}
#app-page.active{display:flex;flex-direction:column;}
.topbar{background:rgba(255,255,255,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;padding:12px 16px;flex-shrink:0;padding-top:max(12px, calc(env(safe-area-inset-top, 0px) + 8px));}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;max-width:100%;}
.topbar-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--forest2),var(--sage));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 3px 10px rgba(45,90,61,0.25);}
.topbar-title{font-family:'Sora',sans-serif;font-weight:800;font-size:16px;line-height:1.1;color:var(--forest);}
.topbar-sub{font-size:11px;color:var(--text3);font-weight:500;}
.btn-sm{padding:8px 14px;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;min-height:36px;font-family:'Manrope',sans-serif;}
.btn-red{background:rgba(201,98,47,0.08);border:1px solid rgba(201,98,47,0.15);color:var(--terra);}
.btn-green{background:linear-gradient(135deg,var(--forest2),var(--sage));color:#fff;box-shadow:0 4px 12px rgba(45,90,61,0.25);border:none;}
.btn-teal{background:linear-gradient(135deg,var(--sage),var(--sage2));color:#fff;box-shadow:0 4px 12px rgba(74,124,89,0.3);border:none;}
.btn-danger{background:linear-gradient(135deg,var(--rose),#e06060);color:#fff;border:none;box-shadow:0 4px 12px rgba(201,74,74,0.2);}
.bottom-nav{flex-shrink:0;background:rgba(255,255,255,0.97);border-top:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;padding:8px 0;position:relative;z-index:300;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;padding:6px 4px;transition:color 0.2s;cursor:pointer;font-family:'Manrope',sans-serif;}
.nav-item.active{color:var(--forest2);}
.nav-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:18px;transition:all 0.2s;}
.nav-item.active .nav-icon{background:var(--mint2);}
.tab-content{display:none;min-height:0;}
.tab-content.active{display:flex;flex-direction:column;flex:1;min-height:0;overflow-y:auto;}
.page-content{padding:16px;max-width:100%;flex:1;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.card-sm{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;box-shadow:0 1px 8px rgba(26,58,42,0.06);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi-card{border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.kpi-val{font-family:'Sora',sans-serif;font-weight:800;font-size:22px;line-height:1.1;}
.kpi-lbl{font-size:11px;font-weight:600;opacity:0.65;margin-top:5px;text-transform:uppercase;letter-spacing:0.6px;}
.kpi-icon{font-size:22px;margin-bottom:8px;}
.trip-header-card{background:linear-gradient(135deg,var(--forest) 0%,var(--forest2) 60%,#3a7a50 100%);border:none;border-radius:22px;padding:22px 20px;margin-bottom:14px;box-shadow:0 8px 30px rgba(26,58,42,0.25);position:relative;overflow:hidden;}
.trip-header-card::before{content:'🌿';font-size:80px;position:absolute;right:-10px;top:-15px;opacity:0.12;}
.list-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;box-shadow:0 1px 8px rgba(26,58,42,0.06);transition:box-shadow 0.2s;}
.list-item:hover{box-shadow:0 4px 16px rgba(26,58,42,0.1);}
.avatar{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:800;font-size:18px;flex-shrink:0;}
.section-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--forest);}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.b-teal{background:var(--mint2);color:var(--forest2);}
.b-amber{background:rgba(212,160,23,0.12);color:#8a6010;}
.b-green{background:rgba(74,124,89,0.1);color:var(--sage);}
.b-coral{background:rgba(201,98,47,0.1);color:var(--terra);}
.bal-pos{background:linear-gradient(135deg,rgba(106,170,122,0.06),rgba(184,223,197,0.15));border:1.5px solid rgba(106,170,122,0.25);border-radius:18px;padding:18px;margin-bottom:10px;}
.bal-neg{background:linear-gradient(135deg,rgba(201,98,47,0.05),rgba(224,120,69,0.08));border:1.5px solid rgba(201,98,47,0.2);border-radius:18px;padding:18px;margin-bottom:10px;}
.bal-zero{background:var(--cream);border:1.5px solid var(--border);border-radius:18px;padding:18px;margin-bottom:10px;}
.settle-card{background:var(--white);border:1.5px solid rgba(58,127,168,0.15);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(58,127,168,0.08);}
.empty{text-align:center;padding:52px 20px;}
.empty-icon{font-size:56px;margin-bottom:14px;opacity:0.4;}
.empty-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text3);font-weight:500;}
.sheet-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,42,30,0.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.sheet-overlay.open{display:flex;}
@media(max-width:767px){.sheet-overlay{bottom:var(--nav-h) !important;}.sheet{border-radius:28px 28px 0 0;padding-bottom:16px !important;max-height:calc(100vh - var(--nav-h) - 20px);overflow-y:auto;}}
@media(min-width:768px){.sheet-overlay{align-items:center;}.sheet{border-radius:28px !important;max-height:90vh;overflow-y:auto;}}
.sheet{background:var(--white);border-radius:28px 28px 0 0;padding:24px 20px;width:100%;max-width:520px;box-shadow:0 -8px 40px rgba(26,58,42,0.15);}
.sheet-handle{width:40px;height:4px;background:var(--cream3);border-radius:4px;margin:0 auto 20px;}
.sheet-title{font-family:'Sora',sans-serif;font-weight:800;font-size:20px;margin-bottom:20px;color:var(--forest);}
.split-row{display:flex;gap:8px;}
.split-opt{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:var(--cream);color:var(--text3);font-weight:700;font-size:13px;transition:all 0.2s;cursor:pointer;font-family:'Manrope',sans-serif;}
.split-opt.active{border-color:var(--sage);background:var(--mint2);color:var(--forest2);}
.currency-row{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:14px;box-shadow:0 1px 6px rgba(26,58,42,0.05);}
.currency-row label{font-size:12px;color:var(--text3);font-weight:700;flex-shrink:0;text-transform:uppercase;letter-spacing:0.5px;}
.currency-row select{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;outline:none;font-family:'Manrope',sans-serif;font-weight:600;}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:16px;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--border);border-radius:50px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap;box-shadow:0 1px 6px rgba(26,58,42,0.05);}
.chip.active-chip{background:var(--mint2);border-color:var(--sage);color:var(--forest2);}
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.sum-cell{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center;box-shadow:0 1px 6px rgba(26,58,42,0.05);}
.sum-val{font-family:'Sora',sans-serif;font-weight:800;font-size:14px;color:var(--forest2);}
.sum-lbl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.trip-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;cursor:pointer;box-shadow:var(--shadow);transition:all 0.2s;}
.trip-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
.trip-card.active-trip{background:var(--mint2);border-color:var(--sage);}
.pdf-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:linear-gradient(135deg,var(--forest2),var(--sage));color:#fff;border:none;border-radius:12px;font-weight:700;font-size:13px;box-shadow:0 4px 14px rgba(45,90,61,0.3);cursor:pointer;font-family:'Manrope',sans-serif;}
.bal-stats{display:flex;gap:8px;margin-top:12px;}
.bal-stat{flex:1;background:rgba(255,255,255,0.8);border-radius:10px;padding:8px 10px;text-align:center;border:1px solid var(--border);}
.bal-stat-val{font-size:13px;font-weight:700;color:var(--forest);font-family:'Sora',sans-serif;}
.bal-stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.fade-up{animation:fadeUp 0.35s ease forwards;}
.flex-row{display:flex;align-items:center;gap:12px;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page" class="page active">
  <div class="blob1"></div><div class="blob2"></div><div class="blob3"></div>
  <div class="auth-card">
    <div class="auth-logo">🌿</div>
    <h1 class="auth-title">Picnic Manager</h1>
    <p class="auth-sub">Smart group expense tracking for trips</p>
    <div class="tab-row" id="auth-tabs">
      <button class="tab-btn active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <div id="auth-alert" class="alert"></div>
    <div id="form-login">
      <div class="form-group"><label class="field-label">Username</label><input class="field-input" id="login-user" type="text" placeholder="your_username" autocomplete="username"></div>
      <div class="form-group"><label class="field-label">Password</label><input class="field-input" id="login-pass" type="password" placeholder="••••••" autocomplete="current-password"></div>
      <button class="primary-btn" onclick="doLogin()">Sign In →</button>
      <button class="link-btn" style="margin-top:12px;" onclick="switchAuthTab('reset')">Forgot password?</button>
    </div>
    <div id="form-signup" style="display:none;">
      <div class="form-group"><label class="field-label">Full Name</label><input class="field-input" id="su-name" type="text" placeholder="John Smith" autocomplete="name"></div>
      <div class="form-group"><label class="field-label">Email</label><input class="field-input" id="su-email" type="email" placeholder="john@email.com" autocomplete="email"></div>
      <div class="form-group"><label class="field-label">Username (4+ chars)</label><input class="field-input" id="su-user" type="text" placeholder="john123" autocomplete="username"></div>
      <div class="form-group"><label class="field-label">Security Question</label>
        <select class="field-input" id="su-sq">
          <option value="">Select question...</option>
          <option>What is your mother's maiden name?</option>
          <option>What was the name of your first pet?</option>
          <option>What city were you born in?</option>
          <option>What is your favorite color?</option>
          <option>What was your childhood nickname?</option>
        </select>
      </div>
      <div class="form-group"><label class="field-label">Security Answer</label><input class="field-input" id="su-sa" type="text" placeholder="Your answer"></div>
      <div class="form-group"><label class="field-label">Password (6+ chars)</label><input class="field-input" id="su-pass" type="password" placeholder="••••••" autocomplete="new-password"></div>
      <div class="form-group"><label class="field-label">Confirm Password</label><input class="field-input" id="su-cpass" type="password" placeholder="••••••" autocomplete="new-password"></div>
      <button class="primary-btn" onclick="doSignup()">Create Account →</button>
    </div>
    <div id="form-reset" style="display:none;">

<script>
/* ============================================================ STATE */
var currentUser=null,trips=[],currentTrip=null,splitType='perHead';
var currencies=[
  {code:'USD',symbol:'$',name:'US Dollar'},{code:'EUR',symbol:'€',name:'Euro'},
  {code:'GBP',symbol:'£',name:'British Pound'},{code:'SAR',symbol:'SAR ',name:'Saudi Riyal'},
  {code:'AED',symbol:'AED ',name:'UAE Dirham'},{code:'INR',symbol:'₹',name:'Indian Rupee'},
  {code:'JPY',symbol:'¥',name:'Japanese Yen'},{code:'CNY',symbol:'¥',name:'Chinese Yuan'},
  {code:'AUD',symbol:'A$',name:'Australian Dollar'},{code:'CAD',symbol:'C$',name:'Canadian Dollar'}
];
var currency=currencies[0];
var avatarColors=[
  ['#2d5a3d','#6aaa7a'],['#3a7fa8','#5ba3ce'],['#c9622f','#e07845'],
  ['#8a6010','#d4a017'],['#c94a4a','#e06060'],['#4a5e80','#7090c0']
];
function getAC(name){return avatarColors[(name.charCodeAt(0)||0)%avatarColors.length];}
function avStyle(name){var c=getAC(name);return 'background:linear-gradient(135deg,'+c[0]+','+c[1]+');color:#fff;';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return currency.symbol+parseFloat(n||0).toFixed(2);}

/* ============================================================ STORAGE */
function sKey(){return 'picnicTrips_'+currentUser.username;}
function cKey(){return 'picnicCurrency_'+currentUser.username;}
function saveTrips(){localStorage.setItem(sKey(),JSON.stringify(trips));}
function loadData(){
  var sc=localStorage.getItem(cKey());
  if(sc){for(var i=0;i<currencies.length;i++){if(currencies[i].code===sc){currency=currencies[i];break;}}}
  var sd=localStorage.getItem(sKey());
  if(sd){try{trips=JSON.parse(sd);}catch(e){trips=[];}
    if(trips.length>0)currentTrip=trips[0];
  }else{trips=[];currentTrip=null;}
}

/* ============================================================ AUTH */
function showAlert(msg,type){var el=document.getElementById('auth-alert');el.textContent=msg;el.className='alert show '+(type==='ok'?'alert-ok':'alert-err');}
function clearAlert(){document.getElementById('auth-alert').className='alert';}
function switchAuthTab(tab){
  clearAlert();
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display=tab==='signup'?'block':'none';
  document.getElementById('form-reset').style.display=tab==='reset'?'block':'none';
  var btns=document.querySelectorAll('#auth-tabs .tab-btn');
  btns[0].className='tab-btn'+(tab==='login'?' active':'');
  btns[1].className='tab-btn'+(tab==='signup'?' active':'');
  document.getElementById('auth-tabs').style.display=tab==='reset'?'none':'flex';
  var ap=document.getElementById('auth-page');
  if(ap)ap.scrollTop=0;
}
function doLogin(){
  clearAlert();var u=document.getElementById('login-user').value.trim();var p=document.getElementById('login-pass').value;
  if(!u||!p){showAlert('Please enter username and password.');return;}
  var users=JSON.parse(localStorage.getItem('picnicUsers')||'[]');
  var found=null;for(var i=0;i<users.length;i++){if(users[i].username===u){found=users[i];break;}}
  if(!found){showAlert('Username not found. Please sign up.');return;}
  if(found.password!==p){showAlert('Incorrect password.');return;}
  showAlert('Welcome back, '+found.fullName+'!','ok');
  setTimeout(function(){localStorage.setItem('currentUser',JSON.stringify(found));startApp(found);},800);
}
function doSignup(){
  clearAlert();
  var name=document.getElementById('su-name').value.trim();var email=document.getElementById('su-email').value.trim();
  var user=document.getElementById('su-user').value.trim();var sq=document.getElementById('su-sq').value;
  var sa=document.getElementById('su-sa').value.trim();var pass=document.getElementById('su-pass').value;
  var cpass=document.getElementById('su-cpass').value;
  if(!name||!email||!user||!pass||!cpass){showAlert('All fields are required.');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showAlert('Invalid email address.');return;}
  if(user.length<4){showAlert('Username must be 4+ characters.');return;}
  if(pass.length<6){showAlert('Password must be 6+ characters.');return;}
  if(pass!==cpass){showAlert('Passwords do not match.');return;}
  if(!sq||sa.length<2){showAlert('Please complete security question.');return;}
  var users=JSON.parse(localStorage.getItem('picnicUsers')||'[]');
  for(var i=0;i<users.length;i++){
    if(users[i].username===user){showAlert('Username already taken.');return;}
    if(users[i].email===email){showAlert('Email already registered.');return;}
  }
  var nu={id:Date.now(),fullName:name,email:email,username:user,password:pass,securityQuestion:sq,securityAnswer:sa.toLowerCase(),createdAt:new Date().toISOString()};
  users.push(nu);localStorage.setItem('picnicUsers',JSON.stringify(users));
  showAlert('Account created! Redirecting to login...','ok');
  setTimeout(function(){switchAuthTab('login');clearAlert();},2500);
}
function loadResetQ(){
  var u=document.getElementById('rs-user').value.trim();
  var users=JSON.parse(localStorage.getItem('picnicUsers')||'[]');
  var found=null;for(var i=0;i<users.length;i++){if(users[i].username===u){found=users[i];break;}}
  var extra=document.getElementById('rs-extra');
  if(found){document.getElementById('rs-sq').textContent=found.securityQuestion;extra.style.display='block';}
  else{extra.style.display='none';}
}
function doReset(){
  clearAlert();var u=document.getElementById('rs-user').value.trim();var sa=document.getElementById('rs-sa').value.trim();
  var pass=document.getElementById('rs-pass').value;var cpass=document.getElementById('rs-cpass').value;
  if(!u){showAlert('Enter your username.');return;}
  var users=JSON.parse(localStorage.getItem('picnicUsers')||'[]');
  var idx=-1;for(var i=0;i<users.length;i++){if(users[i].username===u){idx=i;break;}}
  if(idx===-1){showAlert('Username not found.');return;}
  if(!sa){showAlert('Answer your security question.');return;}
  if(!pass||!cpass){showAlert('Enter new password.');return;}
  if(users[idx].securityAnswer!==sa.toLowerCase()){showAlert('Incorrect security answer.');return;}
  if(pass.length<6){showAlert('Password must be 6+ characters.');return;}
  if(pass!==cpass){showAlert('Passwords do not match.');return;}
  users[idx].password=pass;localStorage.setItem('picnicUsers',JSON.stringify(users));
  showAlert('Password reset! Redirecting...','ok');
  setTimeout(function(){switchAuthTab('login');clearAlert();},2000);
}

/* ============================================================ APP INIT */
function startApp(user){
  currentUser=user;
  document.getElementById('auth-page').classList.remove('active');
  document.getElementById('auth-page').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  document.getElementById('app-page').classList.add('active');
  document.getElementById('topbar-hi').textContent='Hi, '+user.fullName.split(' ')[0]+' 👋';
  loadData();renderAll();switchTab('home');
}
function doLogout(){
  if(!confirm('Logout?'))return;
  localStorage.removeItem('currentUser');
  currentUser=null;trips=[];currentTrip=null;currency=currencies[0];
  document.getElementById('app-page').classList.remove('active');
  document.getElementById('app-shell').style.display='none';
  document.getElementById('auth-page').style.display='';
  document.getElementById('auth-page').classList.add('active');
  switchAuthTab('login');
}
window.addEventListener('load',function(){
  var u=localStorage.getItem('currentUser');
  if(u){try{startApp(JSON.parse(u));}catch(e){localStorage.removeItem('currentUser');}}
  function setNavHeight(){var nav=document.querySelector('.bottom-nav');if(nav){var h=nav.offsetHeight;document.documentElement.style.setProperty('--nav-h',h+'px');}}
  setNavHeight();window.addEventListener('resize',setNavHeight);
});

/* ============================================================ NAV */
function switchTab(tab){
  document.querySelectorAll('.sheet-overlay.open').forEach(function(s){s.classList.remove('open');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  var tc=document.getElementById('tab-'+tab);if(tc)tc.scrollTop=0;
  renderTab(tab);
}
function renderAll(){
  ['home','people','expenses','settle','trips'].forEach(function(t){renderTab(t);});
  updatePDFBtn();
}
function renderTab(tab){
  if(tab==='home')renderHome();else if(tab==='people')renderPeople();
  else if(tab==='expenses')renderExpenses();else if(tab==='settle')renderSettle();
  else if(tab==='trips')renderTrips();
}
function updatePDFBtn(){
  var p=currentTrip&&currentTrip.participants&&currentTrip.participants.length>0;
  var e=currentTrip&&currentTrip.expenses&&currentTrip.expenses.length>0;
  document.getElementById('pdf-btn-top').style.display=(p&&e)?'inline-flex':'none';
}

/* ============================================================ COMPUTED */
function getParts(){return(currentTrip&&currentTrip.participants)||[];}
function getExps(){return(currentTrip&&currentTrip.expenses)||[];}
function totalExp(){return getExps().reduce(function(s,e){return s+e.amount;},0);}
function totalHeads(){return getParts().reduce(function(s,p){return s+p.familyMembers;},0);}
function cph(){var h=totalHeads();return h>0?totalExp()/h:0;}
function cpf(){var f=getParts().length;return f>0?totalExp()/f:0;}
function calcBal(){
  var bal={};
  getParts().forEach(function(p){bal[p.name]=0;});
  getExps().forEach(function(exp){
    var th=totalHeads(),tf=getParts().length;
    var spu=exp.splitType==='perHead'&&th>0?exp.amount/th:(tf>0?exp.amount/tf:0);
    getParts().forEach(function(p){
      var sh=exp.splitType==='perHead'?spu*p.familyMembers:spu;
      if(p.name===exp.paidBy)bal[p.name]+=exp.amount-sh;else bal[p.name]-=sh;
    });
  });
  return bal;
}
function calcSettlements(){
  if(!getParts().length||!getExps().length)return[];
  var bal=calcBal(),settlements=[];
  var debtors=[],creditors=[];
  Object.keys(bal).forEach(function(k){
    if(bal[k]<-0.001)debtors.push({name:k,amount:Math.abs(bal[k])});
    else if(bal[k]>0.001)creditors.push({name:k,amount:bal[k]});
  });
  var d=debtors.map(function(x){return{name:x.name,amount:x.amount};});
  var c=creditors.map(function(x){return{name:x.name,amount:x.amount};});
  var di=0,ci=0;
  while(di<d.length&&ci<c.length){
    var pay=Math.min(d[di].amount,c[ci].amount);
    if(pay>0.001)settlements.push({from:d[di].name,to:c[ci].name,amount:pay});
    d[di].amount-=pay;c[ci].amount-=pay;
    if(d[di].amount<0.001)di++;if(c[ci].amount<0.001)ci++;
  }
  return settlements;
}

/* ============================================================ RENDER: HOME */
function renderHome(){
  var el=document.getElementById('home-content');
  var parts=getParts(),exps=getExps();
  if(!currentTrip){
    el.innerHTML='<div class="empty"><div class="empty-icon">🌿</div><div class="empty-title">No trips yet</div><div class="empty-sub">Create your first group trip</div><br><button class="primary-btn" style="max-width:220px;margin:16px auto 0;display:block;" onclick="openSheet(\'sheet-trip\')">+ Create Trip</button></div>';
    return;
  }
  var html='';
  html+='<div class="trip-header-card">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
  html+='<div><div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;">Active Trip</div>';
  html+='<div style="font-family:Sora,sans-serif;font-weight:800;font-size:22px;color:#fff;line-height:1.2;">'+esc(currentTrip.name)+'</div>';
  html+='<div style="font-size:12px;color:rgba(255,255,255,0.65);margin-top:6px;font-weight:500;">📅 '+new Date(currentTrip.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})+'</div>';
  html+='</div></div></div>';
  html+='<div class="kpi-grid">';
  html+='<div class="kpi-card" style="background:linear-gradient(135deg,#e8f5ec,#d6f0e0);"><div class="kpi-icon">👥</div><div class="kpi-val" style="color:#1a3a2a;">'+parts.length+'</div><div class="kpi-lbl" style="color:#4a7c59;">Families</div></div>';
  html+='<div class="kpi-card" style="background:linear-gradient(135deg,#e8f0fb,#d5e6f7);"><div class="kpi-icon">👨‍👩‍👦</div><div class="kpi-val" style="color:#1a2a4a;">'+totalHeads()+'</div><div class="kpi-lbl" style="color:#3a7fa8;">Total Heads</div></div>';
  html+='<div class="kpi-card" style="background:linear-gradient(135deg,#fdf3e8,#fce8d0);"><div class="kpi-icon">💰</div><div class="kpi-val" style="color:#5a2a0a;">'+fmt(totalExp())+'</div><div class="kpi-lbl" style="color:#c9622f;">Total Spent</div></div>';
  html+='<div class="kpi-card" style="background:linear-gradient(135deg,#f5eafd,#e8d5f5);"><div class="kpi-icon">💲</div><div class="kpi-val" style="color:#3a1a5a;">'+fmt(cph())+'</div><div class="kpi-lbl" style="color:#8a4fc0;">Per Head</div></div>';
  html+='</div>';
  html+='<div class="currency-row"><label>Currency</label><select onchange="changeCurrency(this.value)">';
  currencies.forEach(function(c2){html+='<option value="'+c2.code+'"'+(c2.code===currency.code?' selected':'')+'>'+esc(c2.symbol)+' '+esc(c2.name)+'</option>';});
  html+='</select><span style="color:var(--text3);font-size:18px;">🌐</span></div>';
  if(exps.length>0){
    html+='<div class="section-title" style="margin-top:6px;">⚡ Recent Expenses</div>';
    var recent=[].concat(exps).reverse().slice(0,3);
    recent.forEach(function(exp){
      html+='<div class="list-item" style="display:flex;align-items:center;gap:12px;">';
      html+='<div class="avatar" style="'+avStyle(exp.paidBy)+'">'+esc(exp.paidBy.charAt(0))+'</div>';
      html+='<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);">'+esc(exp.description)+'</div>';
      html+='<div style="font-size:12px;color:var(--text3);margin-top:3px;font-weight:500;">Paid by '+esc(exp.paidBy)+' &nbsp;<span class="badge '+(exp.splitType==='perHead'?'b-teal':'b-amber')+'">'+(exp.splitType==='perHead'?'Per Head':'Per Family')+'</span></div>';
      html+='</div><div style="font-family:Sora,sans-serif;font-weight:800;font-size:16px;color:var(--forest2);flex-shrink:0;">'+fmt(exp.amount)+'</div></div>';
    });
    if(exps.length>3)html+='<div style="text-align:center;font-size:12px;color:var(--text3);margin-top:8px;font-weight:600;">+'+(exps.length-3)+' more — see Expenses tab</div>';
  }
  if(trips.length>1){
    html+='<div class="section-title" style="margin-top:18px;">📚 Switch Trip</div>';
    html+='<div class="chip-row">';
    trips.forEach(function(t){html+='<div class="chip'+(t.id===currentTrip.id?' active-chip':'')+'" onclick="switchTrip('+t.id+')">🌿 '+esc(t.name)+'</div>';});
    html+='</div>';
  }
  el.innerHTML=html;
}

/* ============================================================ RENDER: PEOPLE */
function renderPeople(){
  var el=document.getElementById('people-content');var parts=getParts();
  if(!currentTrip){el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No active trip</div><div class="empty-sub">Create a trip first</div></div>';return;}
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div class="section-title" style="margin-bottom:0;">👥 Participants</div><button class="btn-sm btn-teal" onclick="openSheet(\'sheet-person\')">+ Add</button></div>';
  if(parts.length===0){
    html+='<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">No participants yet</div><div class="empty-sub">Add families or groups to split expenses</div></div>';
  }else{
    var cpHead=cph();
    parts.forEach(function(p){
      var paid=getExps().filter(function(e){return e.paidBy===p.name;}).reduce(function(s,e){return s+e.amount;},0);
      html+='<div class="list-item" style="display:flex;align-items:center;gap:14px;">';
      html+='<div class="avatar" style="'+avStyle(p.name)+'width:48px;height:48px;font-size:20px;">'+esc(p.name.charAt(0))+'</div>';
      html+='<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:16px;color:var(--forest);">'+esc(p.name)+'</div>';

/* ============================================================ ACTIONS */
function changeCurrency(code){
  for(var i=0;i<currencies.length;i++){if(currencies[i].code===code){currency=currencies[i];break;}}
  localStorage.setItem(cKey(),code);renderAll();
}
function createTrip(){
  var name=document.getElementById('new-trip-name').value.trim();
  var date=document.getElementById('new-trip-date').value;
  if(!name||!date){alert('Please enter trip name and date.');return;}
  var nt={id:Date.now(),name:name,date:date,participants:[],expenses:[],createdAt:new Date().toISOString()};
  trips.unshift(nt);currentTrip=nt;
  saveTrips();closeSheet('sheet-trip');
  document.getElementById('new-trip-name').value='';document.getElementById('new-trip-date').value='';
  renderAll();switchTab('home');
}
function switchTrip(id){
  for(var i=0;i<trips.length;i++){if(trips[i].id===id){currentTrip=trips[i];break;}}
  renderAll();switchTab('home');
}
function deleteTrip(id){
  if(!confirm('Delete this trip?'))return;
  trips=trips.filter(function(t){return t.id!==id;});
  if(currentTrip&&currentTrip.id===id){currentTrip=trips.length>0?trips[0]:null;}
  saveTrips();renderAll();
}
function addParticipant(){
  var name=document.getElementById('new-part-name').value.trim();
  var members=parseInt(document.getElementById('new-part-members').value)||1;
  if(!name){alert('Please enter a name.');return;}
  if(!currentTrip)return;
  currentTrip.participants.push({id:Date.now(),name:name,familyMembers:members});
  saveTrips();closeSheet('sheet-person');
  document.getElementById('new-part-name').value='';document.getElementById('new-part-members').value='1';
  renderAll();
}
function removeParticipant(id){
  if(!currentTrip)return;
  currentTrip.participants=currentTrip.participants.filter(function(p){return p.id!==id;});
  saveTrips();renderAll();
}
function openExpSheet(){
  var sel=document.getElementById('new-exp-paidby');
  sel.innerHTML='<option value="">Select person...</option>';
  getParts().forEach(function(p){var opt=document.createElement('option');opt.value=p.name;opt.textContent=p.name;sel.appendChild(opt);});
  document.getElementById('exp-amt-label').textContent='Amount ('+currency.symbol+')';
  openSheet('sheet-expense');
}
function setSplit(type){
  splitType=type;
  document.getElementById('split-head').className='split-opt'+(type==='perHead'?' active':'');
  document.getElementById('split-fam').className='split-opt'+(type==='perFamily'?' active':'');
}
function addExpense(){
  var desc=document.getElementById('new-exp-desc').value.trim();
  var amt=parseFloat(document.getElementById('new-exp-amt').value);
  var paidBy=document.getElementById('new-exp-paidby').value;
  if(!desc||!amt||!paidBy){alert('Please fill in all fields.');return;}
  if(!currentTrip)return;
  currentTrip.expenses.push({id:Date.now(),description:desc,amount:amt,paidBy:paidBy,splitType:splitType,date:new Date().toISOString()});
  saveTrips();closeSheet('sheet-expense');
  document.getElementById('new-exp-desc').value='';document.getElementById('new-exp-amt').value='';
  document.getElementById('new-exp-paidby').value='';setSplit('perHead');renderAll();
}
function removeExpense(id){
  if(!currentTrip)return;
  currentTrip.expenses=currentTrip.expenses.filter(function(e){return e.id!==id;});
  saveTrips();renderAll();
}
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}

/* ============================================================ PDF — KPI DASHBOARD STYLE ============================================================ */
function generatePDF(){
  if(typeof window.jspdf==='undefined'){alert('PDF library loading, please try again.');return;}
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  // ── Page geometry ──────────────────────────────────────────────────────────
  var PW=210, PH=297;
  var PAD=10;       // outer page padding
  var CW=PW-PAD*2;  // content width = 190mm
  var y=PAD;

  // ── Data ──────────────────────────────────────────────────────────────────
  var parts=getParts(), exps=getExps();
  var bal=calcBal(), settlements=calcSettlements();
  var totExp=totalExp(), totHds=totalHeads();
  var cpHead=cph(), cpFam=cpf();
  var totalSettled=settlements.reduce(function(s,t){return s+t.amount;},0);
  var tripDate=new Date(currentTrip.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  var genDate=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  // ── Palette ────────────────────────────────────────────────────────────────
  var C={
    forestDark:[18,52,34],
    forest:[26,90,55],
    forestMid:[40,110,70],
    sage:[74,124,89],
    mint:[214,240,224],
    mintLight:[237,250,243],
    coral:[201,98,47],
    coralLight:[252,238,232],
    sky:[40,100,165],
    skyLight:[232,242,255],
    gold:[180,130,20],
    goldLight:[255,247,224],
    purple:[120,60,180],
    purpleLight:[245,236,255],
    white:[255,255,255],
    nearBlack:[20,30,24],
    dark:[50,65,58],
    mid:[100,120,110],
    light:[180,195,188],
    pageBg:[248,251,249],
    gridLine:[225,235,230]
  };

  function sf(c){doc.setFillColor(c[0],c[1],c[2]);}
  function st(c){doc.setTextColor(c[0],c[1],c[2]);}
  function sd(c){doc.setDrawColor(c[0],c[1],c[2]);}
  function lw(w){doc.setLineWidth(w);}
  function rect(x,r,w,h,fill,stroke){
    if(fill){sf(fill);doc.rect(x,r,w,h,'F');}
    if(stroke){sd(stroke);doc.rect(x,r,w,h,'S');}
  }
  function rRect(x,r,w,h,rx,fill,stroke){
    if(fill){sf(fill);doc.roundedRect(x,r,w,h,rx,rx,'F');}
    if(stroke){sd(stroke);lw(0.3);doc.roundedRect(x,r,w,h,rx,rx,'S');}
  }
  function txt(text,x,r,opts){doc.text(String(text||''),x,r,opts||{});}

  // ── Page background ────────────────────────────────────────────────────────
  sf(C.pageBg); doc.rect(0,0,PW,PH,'F');

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 1 — HEADER BANNER
  // ═══════════════════════════════════════════════════════════════════════════
  var HH=28;
  // Deep green gradient band
  sf(C.forestDark); doc.rect(0,0,PW,HH,'F');
  // Subtle accent stripe
  sf(C.forestMid); doc.rect(0,HH-2,PW,2,'F');

  // Title
  st(C.white); doc.setFont('helvetica','bold'); doc.setFontSize(16);
  txt(currentTrip.name, PAD+2, 11);

  // Sub-labels
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  st([160,200,175]);
  txt('Trip Expense Report  •  '+tripDate, PAD+2, 18);
  txt('Generated: '+genDate+'  |  Currency: '+currency.code+'  |  '+exps.length+' expenses', PAD+2, 23);

  // Picnic badge top-right
  sf(C.sage); doc.roundedRect(PW-PAD-22,3,22,14,3,3,'F');
  st(C.white); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
  txt('PICNIC', PW-PAD-11, 8.5, {align:'center'});
  txt('MANAGER', PW-PAD-11, 14, {align:'center'});

  y = HH + 5;

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 2 — KPI ROW (4 cards)
  // ═══════════════════════════════════════════════════════════════════════════
  var KPIH=26, KPIG=3;
  var KPIW=(CW - KPIG*3)/4;
  var kpis=[
    {label:'TOTAL SPENT',    value:fmt(totExp),   bg:C.mintLight,  accent:C.forest,   border:C.mint},
    {label:'COST PER HEAD',  value:fmt(cpHead),   bg:C.skyLight,   accent:C.sky,      border:[200,225,255]},
    {label:'COST PER FAMILY',value:fmt(cpFam),    bg:C.goldLight,  accent:C.gold,     border:[240,225,180]},
    {label:'FAMILIES / HEADS',value:parts.length+' / '+totHds, bg:C.purpleLight, accent:C.purple, border:[220,200,245]}
  ];
  kpis.forEach(function(k,i){
    var kx=PAD + i*(KPIW+KPIG);
    // Card bg
    rRect(kx, y, KPIW, KPIH, 2, k.bg, k.border);
    // Left accent bar
    sf(k.accent); doc.rect(kx, y, 2.5, KPIH, 'F');
    // Value
    st(k.accent); doc.setFont('helvetica','bold'); doc.setFontSize(11);
    txt(k.value, kx+KPIW/2+1.25, y+11, {align:'center'});
    // Label
    st(C.mid); doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
    txt(k.label, kx+KPIW/2+1.25, y+18.5, {align:'center'});
    // Divider line at bottom
    sd(k.border); lw(0.2); doc.line(kx+3,y+KPIH-3,kx+KPIW-3,y+KPIH-3);
  });
  y += KPIH + 5;

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 3 — TWO COLUMN LAYOUT  (Balances left | Settlements right)
  // ═══════════════════════════════════════════════════════════════════════════
  var colGap=4;
  var COL1W=CW*0.55, COL2W=CW-COL1W-colGap;
  var col1x=PAD, col2x=PAD+COL1W+colGap;

  // ── Helper: section header ──────────────────────────────────────────────
  function sectionLabel(label, x, r, w, accentColor){
    sf(accentColor); doc.rect(x, r, w, 6.5, 'F');
    st(C.white); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
    txt(label, x+4, r+4.5);
    return r+6.5+2;
  }

  // ─────────────────────────────────────
  // LEFT COLUMN: Participant Balances
  // ─────────────────────────────────────
  var ly = sectionLabel('PARTICIPANT BALANCES', col1x, y, COL1W, C.forest);

  // Table header
  var col1cols=[
    {label:'NAME',   x:col1x+3,  w:COL1W*0.38},
    {label:'MEM',    x:col1x+COL1W*0.41, w:COL1W*0.12, align:'center'},
    {label:'PAID',   x:col1x+COL1W*0.55, w:COL1W*0.22, align:'right'},
    {label:'BALANCE',x:col1x+COL1W*0.79, w:COL1W*0.18, align:'right'}
  ];
  sf(C.dark); doc.rect(col1x, ly, COL1W, 5.5, 'F');
  st(C.white); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
  col1cols.forEach(function(c){
    var tx=c.align==='right'?c.x+c.w:(c.align==='center'?c.x+c.w/2:c.x);
    txt(c.label, tx, ly+3.8, {align:c.align||'left'});
  });
  ly+=5.5;

  parts.forEach(function(p,i){
    var b=bal[p.name]||0;
    var paid=exps.filter(function(e){return e.paidBy===p.name;}).reduce(function(s,e){return s+e.amount;},0);
    var isPos=b>0.001, isNeg=b<-0.001;
    var rh=6;
    // Row bg
    if(i%2===0){sf(C.white); doc.rect(col1x,ly,COL1W,rh,'F');}
    else{sf([242,248,245]); doc.rect(col1x,ly,COL1W,rh,'F');}
    // Balance color indicator
    var bColor=isPos?C.forest:isNeg?C.coral:C.mid;
    sf(bColor); doc.rect(col1x,ly,2,rh,'F');

    st(C.nearBlack); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    var nm=p.name.length>14?p.name.substring(0,13)+'..':p.name;
    txt(nm, col1x+4, ly+4.1);

    st(C.dark); doc.setFont('helvetica','normal'); doc.setFontSize(7);
    txt(String(p.familyMembers), col1x+COL1W*0.41+COL1W*0.06, ly+4.1, {align:'center'});
    txt(fmt(paid), col1x+COL1W*0.55+COL1W*0.22, ly+4.1, {align:'right'});

    var bStr=(isPos?'+':isNeg?'-':'')+fmt(Math.abs(b));
    st(bColor); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    txt(bStr, col1x+COL1W, ly+4.1, {align:'right'});
    ly+=rh;
  });

  // Totals row
  sf(C.mint); doc.rect(col1x,ly,COL1W,6,'F');
  st(C.forest); doc.setFont('helvetica','bold'); doc.setFontSize(7);
  txt('TOTAL', col1x+4, ly+4);
  txt(fmt(totExp), col1x+COL1W*0.55+COL1W*0.22, ly+4, {align:'right'});
  txt('—', col1x+COL1W, ly+4, {align:'right'});
  ly+=6+3;

  // ── Legend ────────────────────────────────────────────────
  var legends=[{c:C.forest,l:'Owed (to receive)'},{c:C.coral,l:'Owes (to pay)'},{c:C.mid,l:'Settled'}];
  legends.forEach(function(leg,i){
    var lx=col1x+(i*(COL1W/3));
    sf(leg.c); doc.rect(lx,ly,3,3,'F');
    st(C.mid); doc.setFont('helvetica','normal'); doc.setFontSize(6);
    txt(leg.l, lx+4.5, ly+2.5);
  });
  ly+=5;

  // ─────────────────────────────────────
  // RIGHT COLUMN: Settlement Transactions
  // ─────────────────────────────────────
  var ry = sectionLabel('SETTLEMENT TRANSACTIONS', col2x, y, COL2W, C.coral);

  if(settlements.length===0){
    // All settled banner
    rRect(col2x, ry, COL2W, 16, 3, C.mintLight, C.mint);
    st(C.forest); doc.setFont('helvetica','bold'); doc.setFontSize(9);
    txt('All Settled!', col2x+COL2W/2, ry+7, {align:'center'});
    st(C.sage); doc.setFont('helvetica','normal'); doc.setFontSize(7);
    txt('No transactions required', col2x+COL2W/2, ry+12, {align:'center'});
    ry+=16+3;
  }else{
    // Summary pill
    sf(C.coralLight); doc.roundedRect(col2x, ry, COL2W, 7, 1.5, 1.5, 'F');
    st(C.coral); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    txt(settlements.length+' payment'+(settlements.length>1?'s':'')+' needed  |  Total: '+fmt(totalSettled), col2x+COL2W/2, ry+4.5, {align:'center'});
    ry+=7+3;

    settlements.forEach(function(s,i){
      var sh=14;
      rRect(col2x, ry, COL2W, sh, 2, C.white, C.gridLine);

      // Step number circle
      sf(C.dark); doc.circle(col2x+6, ry+7, 3.5, 'F');
      st(C.white); doc.setFont('helvetica','bold'); doc.setFontSize(7);
      txt(String(i+1), col2x+6, ry+8.8, {align:'center'});

      // Amount badge (top-right)
      sf(C.forest); doc.roundedRect(col2x+COL2W-24, ry+2, 22, 8, 1.5, 1.5, 'F');
      st(C.white); doc.setFont('helvetica','bold'); doc.setFontSize(7);
      txt(fmt(s.amount), col2x+COL2W-13, ry+7.2, {align:'center'});

      // PAYS block
      sf(C.coralLight); doc.roundedRect(col2x+11, ry+1.5, (COL2W-40)/2, 11, 1.5, 1.5, 'F');
      st(C.coral); doc.setFont('helvetica','bold'); doc.setFontSize(5.5);
      txt('PAYS', col2x+11+((COL2W-40)/4), ry+5.5, {align:'center'});
      st(C.nearBlack); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
      var fn=s.from.length>10?s.from.substring(0,9)+'..':s.from;
      txt(fn, col2x+11+((COL2W-40)/4), ry+10.5, {align:'center'});

      // Arrow
      st(C.light); doc.setFont('helvetica','normal'); doc.setFontSize(9);
      txt('>', col2x+11+(COL2W-40)/2+2, ry+8.5);

      // RECEIVES block
      var rx2=col2x+11+(COL2W-40)/2+6;
      sf(C.mintLight); doc.roundedRect(rx2, ry+1.5, (COL2W-40)/2, 11, 1.5, 1.5, 'F');
      st(C.forest); doc.setFont('helvetica','bold'); doc.setFontSize(5.5);
      txt('RECEIVES', rx2+((COL2W-40)/4), ry+5.5, {align:'center'});
      st(C.nearBlack); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
      var tn=s.to.length>10?s.to.substring(0,9)+'..':s.to;
      txt(tn, rx2+((COL2W-40)/4), ry+10.5, {align:'center'});

      ry+=sh+2;
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 4 — EXPENSE BREAKDOWN TABLE (full width)
  // ═══════════════════════════════════════════════════════════════════════════
  var tableTop = Math.max(ly, ry) + 4;

  // Check remaining space — leave 18mm for footer
  var remaining = PH - tableTop - 18;

  tableTop = sectionLabel('EXPENSE BREAKDOWN', PAD, tableTop, CW, C.sky);

  // Table cols
  var ec=[
    {label:'DESCRIPTION', x:PAD+3,       w:CW*0.30},
    {label:'PAID BY',     x:PAD+CW*0.32, w:CW*0.17},
    {label:'SPLIT',       x:PAD+CW*0.51, w:CW*0.11, align:'center'},
    {label:'DATE',        x:PAD+CW*0.63, w:CW*0.13, align:'center'},
    {label:'AMOUNT',      x:PAD+CW,      w:0,        align:'right'}
  ];

  // Table header
  sf(C.dark); doc.rect(PAD, tableTop, CW, 5.5, 'F');
  st(C.white); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
  ec.forEach(function(c){
    var tx=c.align==='right'?PAD+CW-3:(c.align==='center'?c.x+c.w/2:c.x);
    txt(c.label, tx, tableTop+3.8, {align:c.align||'left'});
  });
  tableTop+=5.5;

  var visibleRows=Math.floor(remaining/5.8) - 2;
  var showExps=exps.slice(-Math.max(visibleRows,5));
  if(exps.length>showExps.length){
    // Note about truncation — added at end
  }

  showExps.forEach(function(exp,i){
    var rh=5.8;
    if(tableTop+rh > PH-20) return; // safety
    if(i%2===0){sf(C.white); doc.rect(PAD,tableTop,CW,rh,'F');}
    else{sf([244,249,246]); doc.rect(PAD,tableTop,CW,rh,'F');}

    // Split type color indicator
    var sColor=exp.splitType==='perHead'?C.forest:C.gold;
    sf(sColor); doc.rect(PAD,tableTop,2,rh,'F');

    st(C.nearBlack); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    var desc=exp.description.length>28?exp.description.substring(0,26)+'..':exp.description;
    txt(desc, PAD+4, tableTop+3.8);

    st(C.dark); doc.setFont('helvetica','normal'); doc.setFontSize(7);
    var pb=exp.paidBy.length>14?exp.paidBy.substring(0,13)+'..':exp.paidBy;
    txt(pb, PAD+CW*0.32, tableTop+3.8);

    // Split badge
    var sbg=exp.splitType==='perHead'?C.mint:C.goldLight;
    var sborder=exp.splitType==='perHead'?C.sage:C.gold;
    sf(sbg); doc.roundedRect(PAD+CW*0.51, tableTop+0.8, CW*0.11, 4, 1, 1, 'F');
    st(sColor); doc.setFont('helvetica','bold'); doc.setFontSize(6);
    txt(exp.splitType==='perHead'?'Per Head':'Per Fam.', PAD+CW*0.51+CW*0.055, tableTop+3.8, {align:'center'});

    st(C.mid); doc.setFont('helvetica','normal'); doc.setFontSize(7);
    txt(new Date(exp.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}), PAD+CW*0.63+CW*0.065, tableTop+3.8, {align:'center'});

    st(C.nearBlack); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    txt(fmt(exp.amount), PAD+CW-3, tableTop+3.8, {align:'right'});
    tableTop+=rh;
  });

  // Totals row
  sf(C.mint); doc.rect(PAD, tableTop, CW, 6.5, 'F');
  st(C.forest); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
  txt('GRAND TOTAL', PAD+4, tableTop+4.3);
  txt('Per Head: '+fmt(cpHead)+'   Per Family: '+fmt(cpFam), PAD+CW*0.32, tableTop+4.3);
  txt(fmt(totExp), PAD+CW-3, tableTop+4.3, {align:'right'});
  tableTop+=6.5;

  if(exps.length>showExps.length){
    st(C.mid); doc.setFont('helvetica','italic'); doc.setFontSize(6.5);
    txt('* Showing '+showExps.length+' of '+exps.length+' expenses', PAD+4, tableTop+5);
    tableTop+=8;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // FOOTER
  // ═══════════════════════════════════════════════════════════════════════════
  var FY=PH-10;
  sf(C.forestDark); doc.rect(0, FY-4, PW, 14, 'F');
  sf(C.sage); doc.rect(0, FY-4, PW, 1, 'F');

  st([140,185,160]); doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
  txt('Picnic Manager  •  Trip Expense Report', PAD, FY+3);
  txt(currentTrip.name+' — '+tripDate+'  |  '+parts.length+' families, '+totHds+' members', PW/2, FY+3, {align:'center'});
  st([100,150,125]); txt('Page 1', PW-PAD, FY+3, {align:'right'});

  // ── Save ──────────────────────────────────────────────────────────────────
  doc.save(currentTrip.name.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'_dashboard.pdf');
}
</script>
</body>
</html>
